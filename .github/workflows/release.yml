name: release

# Tag `vX.Y.Z` (matching mix.exs + Cargo.toml) and push it. Per target this
# cross-builds the crate, packs the release artifact, sha256s it, and cosign-signs
# it (keyless/OIDC). The publish job attaches everything to a GitHub Release and
# prints the checksum map to paste into `checksum-compux.exs`.
#
# Per-target artifact shape (Compux.Binary.artifact_name/2):
#   * macOS  — a Developer-ID-signed, notarized, STAPLED `Fermix.app` zipped with
#     ditto: `compux-<ver>-macos-aarch64.zip`. The bundle gives the sidecar a stable
#     TCC identity (io.tezra.fermix.computer-use) so Screen-Recording / Accessibility
#     grants persist across upgrades. Signing is MANDATORY — the build fails loud if
#     the Apple secrets are absent (never ships an ad-hoc bundle, whose per-build
#     identity would re-prompt every upgrade).
#   * Linux  — a bare `compux` binary tarball: `compux-<ver>-linux-x86_64.tar.gz`
#     (no TCC on X11; nothing to sign).
#
# Required macOS repo secrets (a partial set fails the early validate guard, loud):
#   MACOS_CERT_P12_BASE64   base64 of the "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD     its export password
#   MACOS_KEYCHAIN_PASSWORD an ephemeral CI keychain password
#   MACOS_DEVELOPER_ID      e.g. "Developer ID Application: Tezra (TEAMID)"
#   APPLE_ID                Apple ID email for notarytool
#   APPLE_TEAM_ID           the 10-char team id
#   APPLE_APP_PASSWORD      an app-specific password for notarytool
# cosign is keyless (Sigstore OIDC) and needs no secret.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-aarch64
            os: macos-14
          - target: linux-x86_64
            os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux — install system libs (xcap/enigo/arboard link deps)
        if: matrix.target == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libdbus-1-dev libxdo-dev

      - name: Build (release, locked)
        working-directory: native/compux
        run: cargo build --release --locked

      - name: macOS — validate signing secrets are complete
        # Signing is MANDATORY on macOS: fail loud + early if ANY of the seven is
        # missing, rather than shipping an ad-hoc bundle or dying mid-notarization.
        if: matrix.target == 'macos-aarch64'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=""
          for v in MACOS_CERT_P12_BASE64 MACOS_CERT_PASSWORD MACOS_KEYCHAIN_PASSWORD \
                   MACOS_DEVELOPER_ID APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            [ -n "${!v}" ] || missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "::error title=Missing signing secrets::macOS signing is mandatory but these secrets are unset:$missing. Configure all seven on the compux repo and re-run."
            exit 1
          fi

      - name: macOS — import Developer ID certificate
        if: matrix.target == 'macos-aarch64'
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12

      - name: macOS — build, sign, notarize + staple Fermix.app
        if: matrix.target == 'macos-aarch64'
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"

          # Wrap the signed binary in the Fermix.app bundle (hardened runtime).
          scripts/build_app.sh native/compux/target/release/compux Fermix.app "$VERSION" "$DEVELOPER_ID"

          # Notarize the bundle (submit a zip; the ticket is stapled to the .app so
          # Gatekeeper works offline). Submit WITHOUT --wait, then poll: `--wait` holds
          # one HTTP loop open for the whole scan (an hour+ on a first submission) and
          # dies on any transient runner blip. Bounded: 48 polls x 150s = 2h ceiling.
          ditto -c -k --keepParent Fermix.app notarize.zip
          sub_id=$(xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" \
            --output-format json | jq -r '.id')
          rm -f notarize.zip
          echo "notarization submission: $sub_id"
          state="In Progress"
          for attempt in $(seq 1 48); do
            state=$(xcrun notarytool info "$sub_id" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" \
              --output-format json 2>/dev/null | jq -r '.status' || echo "network-error")
            echo "notarization status ($attempt/48): $state"
            case "$state" in
              "Accepted") break ;;
              "Invalid"|"Rejected") break ;;
              *) sleep 150 ;;
            esac
          done
          if [ "$state" != "Accepted" ]; then
            echo "::error title=Notarization did not complete::status=$state (submission $sub_id)"
            xcrun notarytool log "$sub_id" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple Fermix.app
          codesign --verify --deep --strict --verbose=2 Fermix.app

      - name: Package artifact + sha256
        env:
          BIN_DIR: native/compux/target/release
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          if [ "$TARGET" = "macos-aarch64" ]; then
            # ditto-zip the stapled bundle (preserves _CodeSignature/xattrs).
            OUT="compux-${VERSION}-${TARGET}.zip"
            ditto -c -k --keepParent Fermix.app "$OUT"
          else
            OUT="compux-${VERSION}-${TARGET}.tar.gz"
            tar -czf "$OUT" -C "$BIN_DIR" compux
          fi
          shasum -a 256 "$OUT" | awk '{print $1}' > "$OUT.sha256"
          echo "artifact=$OUT" >> "$GITHUB_ENV"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: cosign sign-blob (keyless)
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature "${artifact}.sig" \
            --output-certificate "${artifact}.pem" \
            "${artifact}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            compux-*.tar.gz
            compux-*.tar.gz.sha256
            compux-*.tar.gz.sig
            compux-*.tar.gz.pem
            compux-*.zip
            compux-*.zip.sha256
            compux-*.zip.sig
            compux-*.zip.pem
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Print checksum map (paste into checksum-compux.exs)
        working-directory: dist
        run: |
          set -euo pipefail
          echo "%{"
          for f in compux-*.tar.gz compux-*.zip; do
            [ -e "$f" ] || continue
            target="$(echo "$f" | sed -E 's/^compux-[0-9.]+-(.+)\.(tar\.gz|zip)$/\1/')"
            printf '  "%s" => "%s",\n' "$target" "$(cat "$f.sha256")"
          done
          echo "}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        working-directory: dist
        run: |
          set -euo pipefail
          gh release create "$REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$REF_NAME" \
            --generate-notes \
            compux-*.tar.gz compux-*.tar.gz.sha256 compux-*.tar.gz.sig compux-*.tar.gz.pem \
            compux-*.zip compux-*.zip.sha256 compux-*.zip.sig compux-*.zip.pem
