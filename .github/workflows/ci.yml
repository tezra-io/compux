name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  elixir:
    name: elixir (test + lint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test

  rust:
    name: rust (test + lint)
    runs-on: macos-14
    defaults:
      run:
        working-directory: native/compux
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # The linux-x86_64 release target must never be first compiled at tag time:
  # this leg proves the Linux build (incl. the system libs xcap/enigo/arboard
  # link via pkg-config) on every PR. Keep its apt list in sync with release.yml.
  rust-linux:
    name: rust-linux (build + test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: native/compux
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system libs (xcap/enigo/arboard link deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libdbus-1-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
